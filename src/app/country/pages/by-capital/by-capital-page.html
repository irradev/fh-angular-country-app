<div class="container">
    <country-search [placeholder]="'Buscar por capital'" [debounceTime]="debounceTime()" [initialValue]="query()"
        (searchedValue)="query.set($event)" />

    <country-table-list [countries]="countryResource.hasValue() ? countryResource.value()! : []"
        [errorMessage]="countryResource.error()?.message ?? null" [isLoading]="countryResource.isLoading()" />
</div>

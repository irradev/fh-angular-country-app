<section class="mx-10 mt-4">
    <div class="skeleton h-4 w-12 max-w-md mb-2"></div>
    <div class="skeleton h-10 w-full max-w-md"></div>
    <div class="skeleton h-1 w-full mt-4"></div>
    <div class="grid grid-cols-1 md:grid-cols-2">
        <div class="flex justify-center items-center p-4">
            <div class="skeleton h-64 w-full max-w-md"></div>
        </div>
        <div class="flex flex-col gap-2 p-4">
            <div class="stats stats-vertical shadow-lg">
                <div class="stat">
                    <div class="stat-title">Población</div>
                    <div class="skeleton h-10 w-32"></div>
                </div>

                <div class="stat">
                    <div class="stat-title">Nombre</div>
                    <div class="skeleton h-10 w-40"></div>
                </div>

                <div class="stat">
                    <div class="stat-title">Capital</div>
                    <div class="skeleton h-10 w-32"></div>
                </div>

                <div class="stat">
                    <div class="stat-title">Región</div>
                    <div class="skeleton h-10 w-32"></div>
                </div>

                <div class="stat">
                    <div class="stat-title">Subregión</div>
                    <div class="skeleton h-10 w-32"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="divider mt-6">
        <h3 class="text-2xl">Fronteras</h3>
    </div>
    <div class="flex flex-wrap justify-center gap-2 mt-6">
        @for (item of [1, 2, 3, 4, 5]; track $index) {
        <div class="skeleton h-10 w-24"></div>
        }
    </div>
</section>

<div class="container">
    @if (countryResource.isLoading()) {
    <details-skeleton />
    }
    @else if (countryResource.error() || !countryResource.hasValue()) {
    <shared-not-found [errorMessage]="countryResource.error()?.message ?? null" />
    }
    @else {
    <details-content [country]="countryResource.value()!" />
    }
</div>

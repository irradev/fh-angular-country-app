<div class="container">
    <h3 class="text-2xl font-bold mb-2">Seleccione una región</h3>
    <country-region-buttons [initialValue]="region()" (selectedRegion)="region.set($event)" />

    <country-table-list [countries]="countryResource.value()!" [errorMessage]="countryResource.error()?.message ?? null"
        [isLoading]="countryResource.isLoading()" />

</div>

<h3 class="text-lg font-bold flex items-center gap-2"> <icon-theme [size]="28" /> Theme Settings
</h3>
<p class="py-4">Configura el tema de la aplicación</p>

<div class="flex flex-col gap-3 mt-4 max-h-80 overflow-y-auto">
    @for (theme of themes; track theme) {
    <label
        class="form-control flex justify-between items-center cursor-pointer w-full bg-base-200 border border-base-300 hover:bg-base-300 p-2 rounded-md">
        <span class="label-text ml-2">{{ theme }}</span>
        <input type="radio" name="theme" class="radio radio-accent" (change)="toggleTheme(theme)"
            [checked]="theme === themeService.getTheme()" />
    </label>
    }
</div>
<modal-actions (accept)="accept()" (cancel)="cancel()" />
